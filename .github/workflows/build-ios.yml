name: Build iOS (Godot 4.5)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download Godot 4.5
      run: |
        wget https://github.com/godotengine/godot/releases/download/4.5-stable/Godot_v4.5-stable_macos.universal.zip
        unzip Godot_v4.5-stable_macos.universal.zip
        sudo mv Godot.app /Applications/Godot.app
        sudo ln -sf /Applications/Godot.app/Contents/MacOS/Godot /usr/local/bin/godot

    - name: Cache Godot Export Templates
      uses: actions/cache@v4
      id: cache-templates
      with:
        path: ~/Library/Application Support/Godot/export_templates
        key: godot-templates-4.5.stable

    - name: Download Godot Export Templates
      if: steps.cache-templates.outputs.cache-hit != 'true'
      run: |
        mkdir -p "$HOME/Library/Application Support/Godot/export_templates/4.5.stable"
        wget https://github.com/godotengine/godot/releases/download/4.5-stable/Godot_v4.5-stable_export_templates.tpz
        unzip Godot_v4.5-stable_export_templates.tpz -d /tmp/godot_templates
        mv /tmp/godot_templates/templates/* "$HOME/Library/Application Support/Godot/export_templates/4.5.stable/"

    - name: Verify templates
      run: |
        ls "$HOME/Library/Application Support/Godot/export_templates/4.5.stable/"

    - name: Create build directory
      run: mkdir -p build

    - name: Export iOS project
      timeout-minutes: 20
      run: |
        godot --headless --path . --export-release "iOS" build/fitopolis2final.xcodeproj 2>&1 || true
        echo "Exit code: $?"
        ls -la build/ || echo "Build folder empty"

    - name: Export IPA
      run: |
        APP_PATH=$(find build -name "*.app" | head -1)
        echo "Found app at: $APP_PATH"
        mkdir -p build/Payload
        cp -r "$APP_PATH" build/Payload/
        cd build
        zip -r App.ipa Payload/

    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: iOS-Build
        path: build/App.ipa