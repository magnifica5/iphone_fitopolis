name: Build iOS (Godot 4.5)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest

    steps:
    # -------------------------
    # Checkout repo
    # -------------------------
    - name: Checkout repository
      uses: actions/checkout@v4

    # -------------------------
    # Install Godot 4.5
    # -------------------------
    - name: Download Godot 4.5
      run: |
        wget https://github.com/godotengine/godot/releases/download/4.5-stable/Godot_v4.5-stable_macos.universal.zip
        unzip Godot_v4.5-stable_macos.universal.zip
        sudo mv Godot.app /Applications/Godot.app
        sudo ln -sf /Applications/Godot.app/Contents/MacOS/Godot /usr/local/bin/godot

    # -------------------------
    # Install Export Templates
    # -------------------------
    - name: Download Godot Export Templates
      run: |
        # Calea corecta pentru macOS
        mkdir -p "$HOME/Library/Application Support/Godot/export_templates/4.5.stable"

        wget https://github.com/godotengine/godot/releases/download/4.5-stable/Godot_v4.5-stable_export_templates.tpz

        # Extrage intr-un folder temporar
        unzip Godot_v4.5-stable_export_templates.tpz -d /tmp/godot_templates

        # Muta fisierele din subfolder-ul "templates/" in calea corecta
        mv /tmp/godot_templates/templates/* "$HOME/Library/Application Support/Godot/export_templates/4.5.stable/"

    # -------------------------
    # Build folder
    # -------------------------
    - name: Create build directory
      run: mkdir -p build

    # -------------------------
    # Export iOS project
    # -------------------------
    - name: Export iOS project
      run: |
        godot --headless --export-release "iOS" build/your_project_name.xcodeproj

    # -------------------------
    # Fix deployment target
    # -------------------------
    - name: Set iOS Deployment Target
      run: |
        sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 10.0;/IPHONEOS_DEPLOYMENT_TARGET = 12.0;/' build/your_project_name.xcodeproj/project.pbxproj

    # -------------------------
    # Build with Xcode
    # -------------------------
    - name: Build iOS project
      run: |
        xcodebuild \
          -project build/your_project_name.xcodeproj \
          -scheme your_project_name \
          -configuration Release \
          -archivePath build/your_project_name.xcarchive archive \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO

    # -------------------------
    # Create IPA
    # -------------------------
    - name: Export IPA
      run: |
        APP_PATH="build/your_project_name.xcarchive/Products/Applications/your_project_name.app"
        mkdir -p build/Payload
        cp -r "$APP_PATH" build/Payload/
        cd build
        zip -r App.ipa Payload/

    # -------------------------
    # Upload artifact
    # -------------------------
    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: iOS-Build
        path: build/App.ipa