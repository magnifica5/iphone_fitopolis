name: Build iOS (Godot 4.5)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest

    steps:
    # -------------------------
    # Checkout repo
    # -------------------------
    - name: Checkout repository
      uses: actions/checkout@v4

    # -------------------------
    # Install Godot 4.5
    # -------------------------
    - name: Download Godot 4.5
      run: |
        wget https://github.com/godotengine/godot/releases/download/4.5-stable/Godot_v4.5-stable_osx.universal.zip
        unzip Godot_v4.5-stable_osx.universal.zip -d godot
        sudo mv godot/Godot.app /Applications/Godot.app
        sudo ln -s /Applications/Godot.app/Contents/MacOS/Godot /usr/local/bin/godot

    # -------------------------
    # Install Export Templates (Godot 4 format)
    # -------------------------
    - name: Download Godot Export Templates
      run: |
        mkdir -p ~/.local/share/godot/export_templates/4.5.stable
        cd ~/.local/share/godot/export_templates/4.5.stable

        wget https://github.com/godotengine/godot/releases/download/4.5-stable/Godot_v4.5-stable_export_templates.tpz

        tar -xzf Godot_v4.5-stable_export_templates.tpz

    # -------------------------
    # Build folder
    # -------------------------
    - name: Create build directory
      run: mkdir -p build

    # -------------------------
    # Export iOS project (Godot 4)
    # -------------------------
    - name: Export iOS project
      run: |
        godot --headless --export-release "iOS" build/your_project_name.xcodeproj

    # -------------------------
    # Fix deployment target
    # -------------------------
    - name: Set iOS Deployment Target
      run: |
        sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 10.0;/IPHONEOS_DEPLOYMENT_TARGET = 12.0;/' build/your_project_name.xcodeproj/project.pbxproj

    # -------------------------
    # Build with Xcode
    # -------------------------
    - name: Build iOS project
      run: |
        xcodebuild \
          -project build/your_project_name.xcodeproj \
          -scheme your_project_name \
          -configuration Development \
          -archivePath build/your_project_name.xcarchive archive \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO

    # -------------------------
    # Create IPA
    # -------------------------
    - name: Export IPA
      run: |
        cd build
        cd your_project_name.xcarchive
        cd Products/Applications

        mkdir Payload
        mv your_project_name.app Payload/

        zip -r App.ipa Payload/
        mv App.ipa ../../../

    # -------------------------
    # Upload artifact
    # -------------------------
    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: iOS-Build
        path: build/App.ipa
